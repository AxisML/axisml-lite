# AxisML Lite — single-host Docker Compose deployment.
#
# Default (no profile) brings up the full Lite control plane: PostgreSQL +
# axisml-core (Cluster Manager + Compute Service + Artifact Hub + the in-process
# Standalone runtime) + axisml-platform (API + UI on :8080) + zot (OCI registry).
# Optional profiles add extra storage (rustfs/S3) and the gateway (traefik):
#
#   docker compose up -d                                   # db + core + platform + zot
#   docker compose --profile storage --profile gateway up -d   # + rustfs + gateway
#
# axisml-core builds entirely from this repository; shared System code resolves
# through released Go modules.
# axisml-platform is consumed as a published image; this repository does not
# build Platform source.

name: axisml-lite

services:
  axisml-database:
    image: postgres:16
    environment:
      POSTGRES_USER: axisml
      POSTGRES_PASSWORD: axisml
      POSTGRES_DB: axisml
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axisml -d axisml"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [axisml-control]

  axisml-core:
    build:
      context: ..
      dockerfile: axisml-core/Dockerfile
    image: ghcr.io/axisml/axisml-core:latest
    depends_on:
      axisml-database:
        condition: service_healthy
      zot:
        condition: service_started
    environment:
      AXISML_DATABASE_HOST: axisml-database
      AXISML_DATABASE_PORT: "5432"
      AXISML_DATABASE_NAME: axisml
      AXISML_DATABASE_USER: axisml
      AXISML_DATABASE_PASSWORD: axisml
      AXISML_DATABASE_SSLMODE: disable
      AXISML_OCI_ENDPOINT: http://zot:5000
      AXISML_OCI_ADMIN_USER: admin
      AXISML_OCI_ADMIN_PASSWORD: admin
      AXISML_LOG_LEVEL: info
      AXISML_LOG_FORMAT: json
      # Prefix physical workload/container names when tenants share this daemon.
      # AXISML_WORKLOAD_TENANT_PREFIX: "true"
      # GPU scheduling: a comma list ("0,1,2") schedules onto exactly those
      # physical cards (pins a free card, waits when none is free). Unset leaves
      # GPU workloads on Docker's default count-based request. Requires the host to
      # have the NVIDIA driver + Container Toolkit installed.
      # AXISML_GPU_DEVICES: "0,1,2"
    ports:
      # Published for local development and the e2e suite. Platform reaches it
      # in-cluster at http://axisml-core:8080.
      - "8090:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # cluster-manager pool + tenant definitions (PoolConfigDir = /etc/axisml/pools;
      # resourcepools/*.yaml + tenants/*.yaml, one or more of each)
      - ./config:/etc/axisml/pools:ro
      - traefik-dynamic:/var/lib/axisml/traefik
    networks: [axisml-control]

  # OCI registry backing artifact-hub (axisml-core points at http://zot:5000), so
  # it is part of the default stack. Published on :5001 for the two-phase upload
  # (the suite pushes manifests to the host-visible registry).
  zot:
    image: ghcr.io/project-zot/zot-linux-${TARGETARCH:-arm64}:latest
    volumes:
      - zotdata:/var/lib/registry
    ports:
      - "5001:5000"
    networks: [axisml-control]

  rustfs:
    profiles: ["storage"]
    image: rustfs/rustfs:latest
    volumes:
      - rustfsdata:/data
    networks: [axisml-control]

  traefik:
    profiles: ["gateway"]
    image: traefik:v3.1
    command:
      - "--entrypoints.web.address=:80"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--api.dashboard=false"
    ports:
      - "80:80"
    volumes:
      - traefik-dynamic:/etc/traefik/dynamic:ro
    networks: [axisml-control, axisml-workloads]

  # Single Platform image: the backend serves both the API and the frontend SPA
  # on :8080. The distroless entrypoint needs a subcommand (it prints help and
  # exits with none), so — mirroring the Helm deployment — a one-shot `bootstrap`
  # (migrate + seed the system-admin and default tenant) runs to completion, then
  # the long-running `serve`. Part of the default Lite stack — Lite ships the UI.
  axisml-platform-bootstrap:
    image: &platform-image ghcr.io/axisml/axisml-platform:latest
    command: ["bootstrap"]
    restart: "no"
    depends_on:
      axisml-database:
        condition: service_healthy
      axisml-core:
        condition: service_started
    environment: &platform-env
      AXISML_DATABASE_HOST: axisml-database
      AXISML_DATABASE_PORT: "5432"
      AXISML_DATABASE_NAME: axisml
      AXISML_DATABASE_USER: axisml
      AXISML_DATABASE_PASSWORD: axisml
      AXISML_DATABASE_SSLMODE: disable
      AXISML_SYSTEM_CLUSTER_MANAGER: http://axisml-core:8080
      AXISML_SYSTEM_COMPUTE_SERVICE: http://axisml-core:8080
      AXISML_SYSTEM_ARTIFACT_HUB: http://axisml-core:8080
      AXISML_BOOTSTRAP_USERNAME: admin
      AXISML_BOOTSTRAP_PASSWORD: admin
    networks: [axisml-control]

  axisml-platform:
    image: *platform-image
    command: ["serve"]
    depends_on:
      axisml-platform-bootstrap:
        condition: service_completed_successfully
    environment: *platform-env
    ports:
      - "8080:8080"
    networks: [axisml-control]

networks:
  axisml-control:
    name: axisml-control
  axisml-workloads:
    name: axisml-workloads

volumes:
  pgdata:
  zotdata:
  rustfsdata:
  traefik-dynamic:
