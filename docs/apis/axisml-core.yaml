    MLRun:
      example:
        annotations:
          axisml.io/created-by: li.wei
          git-commit: 8c1f4e2
        createdAt: "2026-06-28T09:25:00Z"
        description: Distributed ResNet-50 training on ImageNet.
        displayName: 'ResNet-50 Training #7'
        id: b7d9e3f1-1a2b-3c4d-5e6f-708192a3b4c5
        labels:
          team: vision
        name: resnet-train-7
        namespace: team-vision
        owner: li.wei
        phase: Running
        spec:
          backend:
            engine: pytorchjob
            name: kubeflow-trainer
          roles:
          - name: worker
            replicas: 4
            restartPolicy: OnFailure
            template:
              args:
              - --epochs
              - "90"
              - --batch-size
              - "256"
              command:
              - python
              - train.py
              env:
              - name: NCCL_DEBUG
                value: INFO
              image: registry.axisml.io/training/resnet:1.4.0
              resources:
                limits:
                  cpu: "8"
                  memory: 64Gi
                  nvidia.com/gpu: "2"
                requests:
                  cpu: "8"
                  memory: 64Gi
                  nvidia.com/gpu: "2"
          runPolicy:
            activeDeadlineSeconds: 86400
            backoffLimit: 2
            ttlSecondsAfterFinished: 3600
          scheduling:
            priorityClass: high-priority
            quota: axisml-team-vision-gpu-a100-default
        status:
          message: All worker replicas ready.
          startedAt: "2026-06-28T09:30:00Z"
        updatedAt: "2026-06-28T09:45:00Z"
      properties:
        annotations:
          additionalProperties:
            type: string
          description: User-defined annotations.
          type: object
        createdAt:
          description: Time the run was created.
          format: date-time
          type: string
        deletedAt:
          description: Soft-deletion timestamp, set once the run is deleted.
          format: date-time
          nullable: true
          type: string
        description:
          description: Free-text run description.
          type: string
        displayName:
          description: Human-readable run label.
          type: string
        id:
          description: Stable run identifier (PG row UUID).
          format: uuid
          type: string
        labels:
          additionalProperties:
            type: string
          description: User-defined labels.
          type: object
        name:
          description: MLRun name, unique within the namespace.
          type: string
        namespace:
          description: Namespace (= tenant identifier) the run belongs to.
          type: string
        owner:
          description: Username of the run owner.
          type: string
        phase:
          description: Current run lifecycle phase (Pending, Running, Succeeded, Failed).
          type: string
        spec:
          allOf:
          - $ref: '#/components/schemas/MLRunSpec'
          description: Resolved MLRun spec sub-tree (backend, scheduling, roles, run
            policy).
        status:
          allOf:
          - $ref: '#/components/schemas/MLRunStatus'
          description: Operator-reported status sub-tree.
        updatedAt:
          description: Time the run was last updated.
          format: date-time
          type: string
      required:
      - createdAt
      - id
      - name
      - namespace
      - phase
      - spec
      - status
      - updatedAt
      type: object
    MLRunBackendSpec:
      properties:
        config:
          description: Embedded Kubernetes resource (free-form JSON).
          nullable: true
          type: object
        engine:
          type: string
        name:
          type: string
      required:
      - engine
      - name
      type: object
    MLRunCreateRequest:
      example:
        backend:
          engine: pytorchjob
