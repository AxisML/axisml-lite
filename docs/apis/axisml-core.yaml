        nodeSelector:
          axisml.io/gpu: a100
        tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Exists
        units:
        - description: 2× A100 GPU compute unit.
          limits:
            cpu: "16"
            memory: 128Gi
            nvidia.com/gpu: "2"
          name: a100-2x
          nodeSelector:
            axisml.io/gpu: a100
          requests:
            cpu: "16"
            memory: 128Gi
            nvidia.com/gpu: "2"
      properties:
        annotations:
          additionalProperties:
            type: string
          description: User-defined annotations to set on the pool.
          type: object
        description:
          description: Human-readable description of the pool.
          type: string
        labels:
          additionalProperties:
            type: string
          description: User-defined labels to set on the pool.
          type: object
        name:
          description: Pool name to create; must be unique and DNS-1123 compliant.
          type: string
        nodeSelector:
          additionalProperties:
            type: string
          description: Node labels that workloads scheduled into this pool must match.
          type: object
        tolerations:
          description: Tolerations applied to workloads scheduled into this pool.
          items:
            $ref: '#/components/schemas/Corev1Toleration'
          type: array
        units:
          description: Initial set of resource units to create inline with the pool.
          items:
            $ref: '#/components/schemas/ServerCreateResourceUnitRequest'
          type: array
      type: object
