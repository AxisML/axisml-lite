servers:
- description: Same-origin (axisml-core)
  url: /
tags:
- description: Aggregate deployment-form capability document — the three System modules'
    per-form documents folded under their component key (design §5.5).
  name: Capabilities
- description: Liveness and readiness probes.
  name: Health
- description: ResourcePool CRD CRUD.
  name: ResourcePools
- description: Sub-routes over pool.spec.units[].
  name: ResourceUnits
- description: Tenant CRD CRUD and per-pool tenant quotas (unit × quantity, folded
    to ElasticQuota); cluster-manager is the REST writer.
  name: Tenants
- description: Durable volume materialisation (PersistentVolumeClaim CRUD); idempotent
    create/delete used by compute for workspace volumes.
  name: Volumes
- description: MLRun CRUD per namespace. ResourcePool/Unit referenced by name (read
    from K8s Informer cache).
  name: MLRuns
- description: MLService CRUD per namespace.
  name: MLServices
- description: 'MLTrafficPolicy CRUD per namespace: weighted / canary / blue-green
    traffic split over member online services.'
  name: TrafficPolicies
- description: Artifact registry partitioned by (namespace, kind, name, version).
  name: Artifacts
