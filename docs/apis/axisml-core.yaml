info:
  description: 'Complete HTTP surface of axisml-core (AxisML Lite single-host form):
    Cluster Manager + Compute Service + Artifact Hub served on one HTTP server, plus
    the Standalone Docker runtime. This document folds the three System specs (axisml-system/docs/apis/{cluster-manager,compute-service,artifact-hub}.yaml)
    into one — their per-resource contracts are reachable at the same paths here —
    alongside the Lite-owned probes and aggregate capability endpoint.'
  title: AxisML Core API
  version: 0.0.0-dev
openapi: 3.0.3
paths:
  /api/v1/capabilities:
    get:
      operationId: getCapabilities
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Capabilities'
          description: Aggregate capability document.
      summary: Get the aggregate capability document
      tags:
      - Capabilities
  /api/v1/namespaces/{namespace}/datasets:
    get:
      operationId: listDatasets
      parameters:
      - description: Tenant namespace (= compute tenants.name).
        in: path
        name: namespace
        required: true
        schema:
          type: string
      - description: Page size (1–200, default 50).
        in: query
        name: limit
        schema:
          format: int32
          type: integer
      - description: Opaque continuation token from a previous page.
        in: query
        name: continue
        schema:
          type: string
      - description: Optional status filter (pending, ready, failed).
        in: query
        name: status
        schema:
          type: string
      - description: K8s-style label selector filtered against the row's labels jsonb.
        in: query
        name: labelSelector
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactList'
          description: Page.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Validation error.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Unauthorized.
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Forbidden.
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Not found.
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Conflict.
        "410":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Gone.
        "412":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Precondition failed.
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Service unavailable.
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Unexpected error.
      summary: List every dataset (across all names) in a namespace
      tags:
      - Artifacts
  /api/v1/namespaces/{namespace}/datasets/{name}:
    get:
      operationId: listDatasetVersions
      parameters:
      - description: Tenant namespace (= compute tenants.name).
        in: path
        name: namespace
        required: true
        schema:
          type: string
      - description: Artifact name.
        in: path
        name: name
        required: true
        schema:
          type: string
      - description: Page size (1–200, default 50).
        in: query
        name: limit
        schema:
          format: int32
          type: integer
      - description: Opaque continuation token from a previous page.
        in: query
        name: continue
        schema:
          type: string
      - description: Optional status filter (pending, ready, failed).
        in: query
        name: status
        schema:
          type: string
      - description: K8s-style label selector filtered against the row's labels jsonb.
        in: query
        name: labelSelector
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactList'
          description: Page.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Validation error.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Unauthorized.
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Forbidden.
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Not found.
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Conflict.
        "410":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Gone.
        "412":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Precondition failed.
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Service unavailable.
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Unexpected error.
      summary: List versions of a dataset
      tags:
      - Artifacts
    post:
      operationId: initiateDataset
      parameters:
      - description: Tenant namespace (= compute tenants.name).
        in: path
        name: namespace
        required: true
        schema:
          type: string
      - description: Artifact name.
        in: path
        name: name
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactInitiateRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactInitiateResponse'
          description: Initiated.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Validation error.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Unauthorized.
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Forbidden.
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Not found.
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Conflict.
        "410":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Gone.
        "412":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Precondition failed.
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Service unavailable.
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactHubError'
          description: Unexpected error.
      summary: Initiate a dataset version (two-phase write step 1)
      tags:
      - Artifacts
  /api/v1/namespaces/{namespace}/datasets/{name}/{version}:
    delete:
      operationId: deleteDataset
      parameters:
      - description: Tenant namespace (= compute tenants.name).
        in: path
        name: namespace
        required: true
        schema:
          type: string
      - description: Artifact name.
        in: path
        name: name
        required: true
        schema:
          type: string
      - description: Artifact version (free-form string).
        in: path
        name: version
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artifact'
          description: Soft-deleted artifact (status=Deleting).
        "400":
          content:
